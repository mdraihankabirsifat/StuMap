<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUET CSE Student Map Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <header class="panel-heading">
        <h1>Student Search</h1>
        <p>Search by ID, name, or thana.</p>
      </header>

      <div class="search-block">
        <label for="searchInput">Find Student</label>
        <input
          id="searchInput"
          type="text"
          placeholder="Try: 2405001, Tofayel, Brahmanpara"
          autocomplete="off"
        >
      </div>

      <div class="results-header">
        <strong id="resultCount">0</strong>
        <span>Matches</span>
      </div>
      <ul id="resultsList" class="results-list"></ul>

      <section class="form-section">
        <h2>Add Student</h2>
        <form id="studentForm" class="student-form">
          <input name="id" placeholder="ID (e.g., 2104999)" required>
          <input name="name" placeholder="Name" required>
          <input name="thana" placeholder="Thana" required>
          <input name="addrress" placeholder="Addrress" required>
          <button type="submit">Add Student</button>
        </form>
        <p class="hint">Stored fields: id, name, thana, addrress.</p>
      </section>
    </aside>

    <main class="map-pane">
      <div id="map"></div>
      <div id="statusBadge" class="status-badge">Ready</div>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js" defer></script>
</body>
</html>
